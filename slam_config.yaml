slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: localization
    use_sim_time: false
    transform_timeout: 2.0
    tf_buffer_duration: 60.0
    map_update_interval: 1.0
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    throttle_scans: 1
